# ReviewOps AI — CI Pipeline
# Runs on every push per rules.md §6: 5 quality gates.
#
# Gates:
# 1. Black + Ruff + isort formatting checks
# 2. mypy type checking
# 3. Unit tests (backend)
# 4. ESLint + TypeScript checks (frontend)
# 5. Secret scanning (gitleaks)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Gate 1-3: Backend ──────────────────────────────
  backend:
    name: Backend (lint + type-check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: "[Gate 1a] Black — formatting check"
        run: black --check .

      - name: "[Gate 1b] Ruff — linting"
        run: ruff check .

      - name: "[Gate 1c] isort — import order check"
        run: isort --check-only .

      - name: "[Gate 2] mypy — type checking"
        run: mypy backend/app --ignore-missing-imports

      - name: "[Gate 3] pytest — unit tests"
        run: pytest -v --tb=short

  # ── Gate 4: Frontend ───────────────────────────────
  frontend:
    name: Frontend (lint + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: "[Gate 4a] ESLint"
        run: npx next lint

      - name: "[Gate 4b] TypeScript — type check"
        run: npx tsc --noEmit

  # ── Gate 5: Secret scanning ────────────────────────
  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[Gate 5] Gitleaks — detect secrets"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
