apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reviewops-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.reviewops.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: reviewops-backend
            port:
              number: 80
