apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviewops-backend
  labels:
    app: reviewops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reviewops-backend
  template:
    metadata:
      labels:
        app: reviewops-backend
    spec:
      containers:
      - name: backend
        image: reviewops-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: reviewops-config
        - secretRef:
            name: reviewops-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
