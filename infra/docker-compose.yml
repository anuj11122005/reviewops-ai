# ReviewOps AI — Docker Compose (Phase 1)
# Services: backend (FastAPI) + postgres + redis

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: reviewops-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://reviewops:reviewops@postgres:5432/reviewops
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - reviewops

  postgres:
    image: postgres:16-alpine
    container_name: reviewops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: reviewops
      POSTGRES_PASSWORD: reviewops
      POSTGRES_DB: reviewops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewops"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reviewops

  redis:
    image: redis:7-alpine
    container_name: reviewops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reviewops

volumes:
  pgdata:

networks:
  reviewops:
    driver: bridge
