# ReviewOps AI — Docker Compose (Phase 1)
# Services: backend (FastAPI) + postgres + redis

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: reviewops-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://reviewops:reviewops@postgres:5432/reviewops
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - reviewops

  postgres:
    image: postgres:16-alpine
    container_name: reviewops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: reviewops
      POSTGRES_PASSWORD: reviewops
      POSTGRES_DB: reviewops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewops"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reviewops

  redis:
    image: redis:7-alpine
    container_name: reviewops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reviewops

  qdrant:
    image: qdrant/qdrant:latest
    container_name: reviewops-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - reviewops

  minio:
    image: minio/minio:latest
    container_name: reviewops-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - reviewops

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/mlflow;
      /usr/bin/mc mb myminio/dvc;
      exit 0;
      "
    networks:
      - reviewops

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: reviewops-mlflow
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: >
      mlflow server
      --backend-store-uri postgresql://reviewops:reviewops@postgres:5432/reviewops
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
    depends_on:
      - postgres
      - minio
    networks:
      - reviewops

  prometheus:
    image: prom/prometheus:latest
    container_name: reviewops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - reviewops

  grafana:
    image: grafana/grafana:latest
    container_name: reviewops-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - reviewops

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  promdata:
  grafanadata:

networks:
  reviewops:
    driver: bridge
